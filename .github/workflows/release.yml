name: Release

# Triggers on tag push (vX.Y.Z, vX.Y.Z-rc.N, etc.). The tag name is the
# canonical version string baked into the binary via -ldflags. Per the
# deploy plan (09_DEPLOY_PLAN.md):
#   - vX.Y.Z-rc.N         → prerelease, Docker tag `rc` + version, NOT `stable`
#   - vX.Y.Z (no suffix)  → full release, Docker tag `stable` + `latest` + version
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to ghcr.io

env:
  GO_VERSION: "1.26.3"
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/netbrain-beacon

jobs:
  # ──────────────────────────────────────────────
  # 1. Build linux/amd64 + windows/amd64 binaries with the tag version baked in.
  #    Outputs go to artifacts/ and are uploaded for the release step to attach.
  # ──────────────────────────────────────────────
  binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p artifacts
          go build -trimpath \
            -ldflags "-s -w -buildid= -X main.version=${VERSION}" \
            -o "artifacts/netbrain-beacon-${VERSION}-${GOOS}-${GOARCH}${{ matrix.ext }}" \
            ./cmd/netbrain-beacon

      - name: SHA256 checksum
        run: |
          cd artifacts
          sha256sum "netbrain-beacon-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            > "netbrain-beacon-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.sha256"

      - name: Smoke test the binary (linux only)
        if: matrix.goos == 'linux'
        run: |
          ./artifacts/netbrain-beacon-${{ github.ref_name }}-linux-amd64 version

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: artifacts/
          retention-days: 30   # keep on the workflow until release attaches them

  # ──────────────────────────────────────────────
  # 2. Build & push the distroless Docker image to GHCR with version tags.
  # ──────────────────────────────────────────────
  docker:
    name: Push Docker image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # Always tag the exact version (e.g. v0.1.0-rc.1)
            type=ref,event=tag
            # Strip the leading "v" for a semver tag (0.1.0-rc.1)
            type=semver,pattern={{version}}
            # Major.minor for non-prerelease tags
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            # `rc` channel pointer for *-rc.* tags (canary cohort installs by this)
            type=raw,value=rc,enable=${{ contains(github.ref_name, '-rc') }}
            # `stable` + `latest` channel pointers ONLY for non-prerelease tags
            type=raw,value=stable,enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 3. Create the GitHub Release with binaries + checksums attached.
  #    Marks prerelease when the tag contains a hyphen (-rc, -beta, etc.).
  # ──────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [binaries, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need the prior tag to generate release notes from commits since
          # the previous release.
          fetch-depth: 0

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: List artifacts (sanity)
        run: ls -la artifacts/

      - name: Determine release type
        id: release_type
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Channel: rc / prerelease"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Channel: stable"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/* \
            --title "netbrain-beacon ${{ github.ref_name }}" \
            --generate-notes \
            ${{ steps.release_type.outputs.prerelease == 'true' && '--prerelease' || '' }} \
            --notes-start-tag "$(git tag --sort=-v:refname | grep -v '^${{ github.ref_name }}$' | head -1 || echo '')"
